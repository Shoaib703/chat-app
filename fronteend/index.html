<!DOCTYPE html>
<html>
<head>
  <title>Socket Test</title>
</head>
<body>
  <h2>Socket.IO Test</h2>

  <input type="text" id="message" placeholder="Type message..." />
  <button onclick="sendMessage()">Send</button>

  <ul id="messages">
  </ul>



  <!-- IMPORTANT: Backend port must match -->
  <script src="http://localhost:8000/socket.io/socket.io.js"></script>

  <script>
    const socket = io("http://localhost:8000");

    var conversationid="69b3f6dd93497976840fdca9";
    socket.on("connect", () => {
      console.log("Connected:", socket.id);
      socket.emit("join-room",{conversationid})
    });

    // socket.on("newmsg", (data) => {
     
    //   console.log("Received from server:", data);
    // });

    
    function sendMessage() {
      const input = document.getElementById("message");
      const userId = new URLSearchParams(window.location.search).get("user");
      // socket.emit("send-message",input.value,conversationid);
        socket.emit("send-message", input.value, conversationid, userId);
      input.value = "";
      // showmessage()
    }

    socket.on("newmsg",(data)=>{
        const output=document.getElementById("messages");
        console.log("hehehe")
        output.innerHTML=output.innerHTML+data+ "<br/>";
        data=""
      })
  </script>
</body>
</html>
